<!DOCTYPE html>
<html lang="en">

<head>
    <title>TOA Kaliedoscope</title>
    <!--<link rel="icon" href="favicon.ico" type="image/x-icon">-->
    <!-- Or for a PNG: -->
    <link rel="icon" href="img/icon.png" type="image/png">
    <!-- Allow web app to be run in full-screen mode. -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Make the app title different than the page title. -->
    <meta name="apple-mobile-web-app-title" content="Kaliedoscope">

    <!-- Configure the status bar. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-transparent">

    <!-- Set the viewport. -->
    <!--<meta name="viewport" content="width=device-width, initial-scale=1.0">-->
    <!--<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Set OGP stuff -->
    <!-- Open Graph Protocol (OGP) Meta Tags for Link Previews -->
    <meta property="og:title" content="Kaliedoscope">
    <meta property="og:description" content="Clipping path example">
    <meta property="og:image" content="img/launch.png">
    <meta property="og:url" content="https://www.tribeofabraham.com">
    <meta property="og:type" content="website"> <!-- Or "article", "blog", etc. -->

    <!-- Set iOS stuff -->
    <link rel="apple-touch-icon" href="img/icon.png">
    <link rel="apple-touch-icon" sizes="76x76" href="img/icon-76x76.png">
    <link rel="apple-touch-icon" sizes="120x120" href="img/icon-120x120.png">
    <link rel="apple-touch-icon" sizes="152x152" href="img/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="img/icon-180x180.png">
    <link rel="apple-touch-startup-image" href="img/launch_portrait.png"
        media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
    <link rel="apple-touch-startup-image" href="img/launch.png"
        media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)">
    <!-- Add more sizes and media queries for other devices and orientations -->

    <script src="js/jquery-3.6.1.min.js"></script>
    <script src="js/tincan.js"></script>
    <script src="js/kali.js"></script>
    <link rel="stylesheet" type="text/css" href="css/kali.css">
    <link rel="stylesheet" type="text/css" href="css/fonts.css">
    <link rel="stylesheet" type="text/css" href="css/colors.css">

</head>

<body>

    <div id="wrapper" role="main">
        <div class="kali">

        </div>
        <ul class="kaliSelect">
        </ul>
        <div class="speedControl">
            <label for="speedSlider">Rotation Speed:</label>
            <input type="range" id="speedSlider" min="-10" max="10" value="0" step="0.5">
            <div class="speedLabels">
                <span>Counter-Clockwise</span>
                <span>Stop</span>
                <span>Clockwise</span>
            </div>
        </div>
    </div>

</body>

</html>
