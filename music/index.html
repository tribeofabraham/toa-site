<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music · Tribe of Abraham</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #000;
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  font-family: 'DM Sans', system-ui, sans-serif;
}

/* Both iframes fill the viewport, stacked */
.app-frame {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: block;
  transition: opacity 0.3s ease;
}
.app-frame.hidden {
  opacity: 0;
  pointer-events: none;
}

/* Floating toggle icons */
.fab-group {
  position: fixed;
  bottom: clamp(0.8rem, 2.5vmin, 1.5rem);
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: row;
  gap: clamp(0.4rem, 1vmin, 0.7rem);
  z-index: 1000;
}

.fab {
  width: clamp(2.2rem, 4.5vmin, 3.2rem);
  height: clamp(2.2rem, 4.5vmin, 3.2rem);
  border-radius: 50%;
  border: solid 0.12em rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.7);
  color: rgba(255,255,255,0.6);
  font-size: clamp(0.9rem, 2vmin, 1.4rem);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  backdrop-filter: blur(0.5em);
  -webkit-backdrop-filter: blur(0.5em);
}
.fab:hover {
  border-color: rgba(255,255,255,0.6);
  color: white;
}
.fab.active {
  background: rgba(255,255,255,0.15);
  border-color: white;
  color: white;
}
</style>
</head>
<body>

<iframe id="notationFrame" class="app-frame" src="../notation/" title="Nashville Notation Wheel"></iframe>
<iframe id="sequencerFrame" class="app-frame hidden" src="../sequencer/" title="Drum Sequencer"></iframe>

<div class="fab-group">
  <button class="fab active" id="fabNotation" onclick="showApp('notation')" title="Nashville Notation">&#9836;</button>
  <button class="fab" id="fabSequencer" onclick="showApp('sequencer')" title="Drum Sequencer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:60%;height:60%"><ellipse cx="12" cy="14" rx="9" ry="5"/><path d="M3 14V9a9 5 0 0 1 18 0v5"/><line x1="7" y1="3" x2="12" y2="9"/><line x1="17" y1="3" x2="12" y2="9"/></svg></button>
</div>

<script>
function showApp(which) {
  const nFrame = document.getElementById('notationFrame');
  const sFrame = document.getElementById('sequencerFrame');
  const fabN = document.getElementById('fabNotation');
  const fabS = document.getElementById('fabSequencer');

  if (which === 'notation') {
    nFrame.classList.remove('hidden');
    sFrame.classList.add('hidden');
    fabN.classList.add('active');
    fabS.classList.remove('active');
  } else {
    sFrame.classList.remove('hidden');
    nFrame.classList.add('hidden');
    fabS.classList.add('active');
    fabN.classList.remove('active');
  }
}
</script>
</body>
</html>
