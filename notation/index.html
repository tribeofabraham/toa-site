<!DOCTYPE html>
<html lang="en">

<head>
    <title>Nashville Notation Wheel · Tribe of Abraham</title>
    <link rel="icon" href="../favicon.ico" sizes="any">
    <link rel="icon" href="../images/favicon-32x32.png" type="image/png" sizes="32x32">
    <link rel="icon" href="../images/favicon-16x16.png" type="image/png" sizes="16x16">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Nashville Notation">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Nashville Notation Wheel · Tribe of Abraham">
    <meta property="og:description" content="Interactive circle of fifths built around the Nashville Number System. Select a key, see chord diagrams and color-coded keyboards.">
    <meta property="og:image" content="https://www.tribeofabraham.com/images/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Nashville Notation Wheel · Tribe of Abraham">
    <meta name="twitter:image" content="https://www.tribeofabraham.com/images/og-image.png">
    <link rel="apple-touch-icon" href="../images/apple-touch-icon.png">
    <!-- Add more sizes and media queries for other devices and orientations -->

    <script src="js/jquery-3.6.1.min.js"></script>
    <script src="js/nn.js"></script>
    <link rel="stylesheet" type="text/css" href="css/nn.css">
    <link rel="stylesheet" type="text/css" href="css/fonts.css">
    <link rel="stylesheet" type="text/css" href="css/colors.css">
</head>

<body>
    <div id="wrapper" role="main">

        <div class="circle">
            <div class="wheelBack"></div>
            <img id="numbers" class="ring" src="img/nnInner.svg" alt="Nashville notation numbers wheel" />
            <img id="keys" class="ring" src="img/nnOuter.svg" alt="Musical keys wheel" />

        </div>
        <div id="selectKey" class="">
            <h1 class="keyTxt" id="keyLabel">KEY</h1>
            <select tabindex="0" aria-labelledby="keyLabel">
                <option>C</option>
                <option>C#/Db</option>
                <option>D</option>
                <option>D#/Eb</option>
                <option>E</option>
                <option>F</option>
                <option>F#/Gb</option>
                <option>G</option>
                <option>G#/Ab</option>
                <option>A</option>
                <option>A#/Bb</option>
                <option>B</option>
            </select>
            <h1 class="transposeTxt">TRANSPOSE</h1>
            <div id="trans">0</div>
            <div id="tranUp" class="tranBtn down" tabindex="0"></div>
            <div id="tranDown" class="tranBtn up" tabindex="0"></div>
        </div>

        <div class="chords">

            <div id="progression">
                <!--<div class="keyColor">
               <h2>by chord</h2><input type="range" min="0" max="1" value="0" /><h2>by key</h2>
            </div>-->

                <div id="selectProg1" class="dialog bottom">
                    <select class="chordSelect" aria-label="Chord 1 number">
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                        <option>6</option>
                        <option>7</option>
                    </select>
                    <select class="modSelect" aria-label="Chord 1 modifier">
                        <option value="0"></option>
                        <option value="1">m</option>
                        <option value="2">7</option>
                        <option value="3">b</option>
                        <option value="4">bm</option>
                        <option value="5">b7</option>

                    </select>
                    <div class="chordChart">
                    </div>
                    <div class="scales">
                        <div class="note"></div>
                    </div>
                    <div class="pianoChartBack"></div>
                    <div class="pianoChart">

                    </div>
                </div>
                <div id="selectProg2" class="dialog bottom">
                    <select class="chordSelect" aria-label="Chord 2 number">
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                        <option>6</option>
                        <option>7</option>
                    </select>
                    <select class="modSelect" aria-label="Chord 2 modifier">
                        <option value="0"></option>
                        <option value="1">m</option>
                        <option value="2">7</option>
                        <option value="3">b</option>
                        <option value="4">bm</option>
                        <option value="5">b7</option>

                    </select>
                    <div class="chordChart">
                    </div>
                    <div class="scales">
                    </div>
                    <div class="pianoChartBack"></div>
                    <div class="pianoChart">

                    </div>
                </div>
                <div id="selectProg3" class="dialog bottom">
                    <select class="chordSelect" aria-label="Chord 3 number">
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                        <option>6</option>
                        <option>7</option>
                    </select>
                    <select class="modSelect" aria-label="Chord 3 modifier">
                        <option value="0"></option>
                        <option value="1">m</option>
                        <option value="2">7</option>
                        <option value="3">b</option>
                        <option value="4">bm</option>
                        <option value="5">b7</option>

                    </select>
                    <div class="chordChart">
                    </div>
                    <div class="scales">
                    </div>
                    <div class="pianoChartBack"></div>
                    <div class="pianoChart">

                    </div>
                </div>
                <div id="selectProg4" class="dialog bottom">
                    <select class="chordSelect" aria-label="Chord 4 number">
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                        <option>5</option>
                        <option>6</option>
                        <option>7</option>
                    </select>
                    <select class="modSelect" aria-label="Chord 4 modifier">
                        <option value="0"></option>
                        <option value="1">m</option>
                        <option value="2">7</option>
                        <option value="3">b</option>
                        <option value="4">bm</option>
                        <option value="5">b7</option>

                    </select>
                    <div class="chordChart">
                    </div>
                    <div class="scales">
                    </div>
                    <div class="pianoChartBack"></div>
                    <div class="pianoChart">

                    </div>
                </div>

            </div>
        </div>


    </div>
</body>

</html>
